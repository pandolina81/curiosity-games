<!doctype html>
<html lang="it" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Outfit:wght@300;400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
html,body{height:100%;margin:0;padding:0;overflow:hidden}
*{box-sizing:border-box}
body{font-family:'Outfit',sans-serif}
.space-mono{font-family:'Space Mono',monospace}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(var(--accent-rgb),0.3)}50%{box-shadow:0 0 40px rgba(var(--accent-rgb),0.6)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes card-flip{0%{transform:rotateY(0) scale(1)}50%{transform:rotateY(90deg) scale(0.9)}100%{transform:rotateY(0) scale(1)}}
@keyframes falling{0%{top:-80px}100%{top:calc(100% + 80px)}}
@keyframes pop-in{0%{transform:scale(0);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes timer-pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.anim-fade{animation:fadeIn 0.5s ease forwards}
.anim-shake{animation:shake 0.4s ease}
.anim-flip{animation:card-flip 0.5s ease}
.anim-pop{animation:pop-in 0.35s ease forwards}
.falling-obj{position:absolute;animation:falling linear;cursor:pointer;user-select:none;transition:transform 0.15s,opacity 0.15s}
.falling-obj:hover{transform:scale(1.1)}
.falling-obj.caught{transform:scale(0)!important;opacity:0!important}
.card-hover{transition:all 0.2s ease}
.card-hover:hover{transform:translateY(-4px);box-shadow:0 12px 24px rgba(0,0,0,0.3)}
.card-hover:active{transform:translateY(0)}
.progress-bar{transition:width 0.3s ease}
.timer-bar{transition:width 0.1s linear}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.2);border-radius:3px}
</style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full overflow-auto" style="background:#0a0a0f">
   <!-- MENU -->
   <div id="menu-screen" class="h-full w-full flex flex-col items-center justify-center p-4" style="background:linear-gradient(135deg,#0a0a0f 0%,#1a1025 50%,#0a0a0f 100%)">
    <div class="text-center mb-10 anim-fade">
     <h1 id="main-title" class="text-5xl md:text-7xl font-black mb-3" style="color:#f0e6ff;letter-spacing:-2px">Curiosity Games</h1>
     <p class="text-lg space-mono" style="color:#8b7aa8">3 giochi · domande generate dall'AI · sempre diverse</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-5 max-w-4xl w-full px-4">
     <button onclick="startGame('caccia')" class="card-hover rounded-2xl p-6 text-left border anim-fade" style="background:linear-gradient(145deg,#1a1535,#251845);border-color:#3d2a6e;animation-delay:0.1s;opacity:0">
      <div class="text-4xl mb-3">
       🃏
      </div><h2 class="text-xl font-bold mb-2" style="color:#c4a8ff">Caccia alla Curiosità</h2><p class="text-sm leading-relaxed" style="color:#8b7aa8">10 domande bizzarre, 6 carte, solo 2 giuste. 8 secondi. Un errore = game over.</p></button> <button onclick="startGame('oblio')" class="card-hover rounded-2xl p-6 text-left border anim-fade" style="background:linear-gradient(145deg,#0d1a25,#0a2540);border-color:#1a4a6e;animation-delay:0.25s;opacity:0">
      <div class="text-4xl mb-3">
       📖
      </div><h2 class="text-xl font-bold mb-2" style="color:#7ec8e3">Curva dell'Oblio</h2><p class="text-sm leading-relaxed" style="color:#5a8a9f">Memorizza parole e curiosità, poi riscrivile. 8 livelli, da 3 a 10 parole. Max 5 errori.</p></button> <button onclick="startGame('sprint')" class="card-hover rounded-2xl p-6 text-left border anim-fade" style="background:linear-gradient(145deg,#1a1a0d,#2a2510);border-color:#5a5020;animation-delay:0.4s;opacity:0">
      <div class="text-4xl mb-3">
       ⚡
      </div><h2 class="text-xl font-bold mb-2" style="color:#f0d060">Curiosity Sprint</h2><p class="text-sm leading-relaxed" style="color:#9a8a50">Fatti veri (verdi) e falsi (rossi) cadono dall'alto. Tocca solo quelli veri! 5 vite, 50 per vincere.</p></button>
    </div>
   </div><!-- GAME CONTAINER -->
   <div id="game-screen" class="h-full w-full hidden flex-col overflow-auto" style="background:#0a0a0f">
    <div class="flex items-center justify-between p-3 px-5" style="background:rgba(10,10,15,0.95);border-bottom:1px solid rgba(255,255,255,0.08)">
     <button onclick="backToMenu()" class="flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-semibold" style="color:#8b7aa8;background:rgba(255,255,255,0.05)"> <i data-lucide="arrow-left" style="width:16px;height:16px"></i> Menu </button>
     <div id="game-header-info" class="flex items-center gap-4 text-sm space-mono" style="color:#8b7aa8"></div>
    </div>
    <div id="game-area" class="flex-1 overflow-auto relative"></div>
   </div>
  </div>
  <script>
// ============ CONFIG & SDK ============
const defaultConfig={main_title:"Curiosity Games",bg_color:"#0a0a0f",surface_color:"#1a1535",text_color:"#f0e6ff",primary_color:"#c4a8ff",secondary_color:"#8b7aa8"};

window.elementSdk.init({
  defaultConfig,
  onConfigChange:async(c)=>{
    const t=document.getElementById('main-title');
    if(t)t.textContent=c.main_title||defaultConfig.main_title;
    document.body.style.fontFamily=c.font_family?`${c.font_family},Outfit,sans-serif`:'Outfit,sans-serif';
    if(c.font_size){
      document.querySelectorAll('h1').forEach(e=>e.style.fontSize=`${c.font_size*2.5}px`);
      document.querySelectorAll('h2').forEach(e=>e.style.fontSize=`${c.font_size*1.3}px`);
      document.querySelectorAll('p,span,button').forEach(e=>{if(!e.closest('h1')&&!e.closest('h2'))e.style.fontSize=`${c.font_size}px`});
    }
    document.getElementById('app').style.background=c.bg_color||defaultConfig.bg_color;
  },
  mapToCapabilities:(c)=>({
    recolorables:[
      {get:()=>c.bg_color||defaultConfig.bg_color,set:v=>{c.bg_color=v;window.elementSdk.setConfig({bg_color:v})}},
      {get:()=>c.surface_color||defaultConfig.surface_color,set:v=>{c.surface_color=v;window.elementSdk.setConfig({surface_color:v})}},
      {get:()=>c.text_color||defaultConfig.text_color,set:v=>{c.text_color=v;window.elementSdk.setConfig({text_color:v})}},
      {get:()=>c.primary_color||defaultConfig.primary_color,set:v=>{c.primary_color=v;window.elementSdk.setConfig({primary_color:v})}},
      {get:()=>c.secondary_color||defaultConfig.secondary_color,set:v=>{c.secondary_color=v;window.elementSdk.setConfig({secondary_color:v})}}
    ],
    borderables:[],
    fontEditable:{get:()=>c.font_family||defaultConfig.font_family||'Outfit',set:v=>{c.font_family=v;window.elementSdk.setConfig({font_family:v})}},
    fontSizeable:{get:()=>c.font_size||16,set:v=>{c.font_size=v;window.elementSdk.setConfig({font_size:v})}}
  }),
  mapToEditPanelValues:(c)=>new Map([["main_title",c.main_title||defaultConfig.main_title]])
});

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function generateCacciaQuestions(){return shuffle(CURIOSITY_DB).slice(0,10).map(q=>({...q,wrong:shuffle(q.wrong).slice(0,4),correct:shuffle(q.correct)}))}
function generateMemoryWords(count){return shuffle(MEMORY_WORDS_POOL).slice(0,count)}
function generateSprintFacts(){return shuffle(SPRINT_FACTS)}

// ============ NAVIGATION ============
let currentGame=null;
let gameTimers=[];

function clearTimers(){gameTimers.forEach(t=>{clearTimeout(t);clearInterval(t)});gameTimers=[]}
function addTimer(t){gameTimers.push(t);return t}

function showScreen(id){
  document.getElementById('menu-screen').classList.add('hidden');
  document.getElementById('menu-screen').classList.remove('flex');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('flex');
  document.getElementById(id).classList.remove('hidden');
  document.getElementById(id).classList.add('flex');
}

function backToMenu(){
  clearTimers();
  currentGame=null;
  showScreen('menu-screen');
}

function startGame(type){
  clearTimers();
  currentGame=type;
  const area=document.getElementById('game-area');
  area.innerHTML='';
  showScreen('game-screen');
  setTimeout(()=>{
    if(type==='caccia')initCaccia();
    else if(type==='oblio')initOblio();
    else if(type==='sprint')initSprint();
    if(window.lucide)window.lucide.createIcons();
  },100);
}

window.backToMenu=backToMenu;
window.startGame=startGame;

// ============ GAME 1: CACCIA ALLA CURIOSITÀ ============
function initCaccia(){
  const questions=generateCacciaQuestions();
  let current=0,score=0;
  const area=document.getElementById('game-area');
  const info=document.getElementById('game-header-info');

  function updateInfo(){
    info.innerHTML=`<span style="color:#c4a8ff">🃏 ${current+1}/10</span><span style="color:#f0d060">⭐ ${score}</span>`;
  }

  function showQuestion(){
    if(current>=10){showCacciaResult(score,true);return}
    updateInfo();
    const q=questions[current];
    const allAnswers=shuffle([...q.correct.slice(0,2),...q.wrong.slice(0,4)]);
    let timeLeft=8;
    area.innerHTML=`
      <div class="flex flex-col items-center justify-center h-full p-4" style="min-height:400px">
        <div class="w-full max-w-2xl">
          <div class="mb-2 flex justify-between items-center">
            <span class="text-xs space-mono" style="color:#8b7aa8">DOMANDA ${current+1}/10</span>
            <span id="timer-text" class="text-sm font-bold space-mono" style="color:#f0d060">${timeLeft}s</span>
          </div>
          <div class="w-full rounded-full h-1.5 mb-6" style="background:rgba(255,255,255,0.1)">
            <div id="timer-bar" class="h-full rounded-full timer-bar" style="width:100%;background:linear-gradient(90deg,#c4a8ff,#f0d060)"></div>
          </div>
          <h2 class="text-xl md:text-2xl font-bold text-center mb-8" style="color:#f0e6ff">${q.q}</h2>
          <div class="grid grid-cols-2 md:grid-cols-3 gap-3" id="cards-grid">
            ${allAnswers.map((a,i)=>`
              <button onclick="cacciaAnswer(this,'${a.replace(/'/g,"\\'")}',${q.correct.includes(a)})" 
                class="card-hover anim-pop rounded-xl p-4 text-center font-semibold border transition-all"
                style="background:linear-gradient(145deg,#1a1535,#251845);border-color:#3d2a6e;color:#f0e6ff;animation-delay:${i*0.07}s;opacity:0"
                data-answer="${a}">
                ${a}
              </button>
            `).join('')}
          </div>
        </div>
      </div>`;
    
    const timerInterval=addTimer(setInterval(()=>{
      timeLeft--;
      const tb=document.getElementById('timer-bar');
      const tt=document.getElementById('timer-text');
      if(tb)tb.style.width=`${(timeLeft/8)*100}%`;
      if(tt){tt.textContent=`${timeLeft}s`;if(timeLeft<=3)tt.style.color='#ff6b6b'}
      if(timeLeft<=0){clearInterval(timerInterval);showCacciaResult(score,false)}
    },1000));

    window.cacciaAnswer=function(btn,answer,isCorrect){
      clearTimers();
      document.querySelectorAll('#cards-grid button').forEach(b=>b.disabled=true);
      if(isCorrect){
        btn.style.background='linear-gradient(145deg,#1a3520,#254530)';
        btn.style.borderColor='#4ade80';
        btn.style.color='#4ade80';
        score++;
        current++;
        addTimer(setTimeout(showQuestion,800));
      } else {
        btn.style.background='linear-gradient(145deg,#351a1a,#452525)';
        btn.style.borderColor='#ff6b6b';
        btn.style.color='#ff6b6b';
        btn.classList.add('anim-shake');
        // highlight correct answers
        document.querySelectorAll('#cards-grid button').forEach(b=>{
          if(questions[current].correct.includes(b.dataset.answer)){
            b.style.background='linear-gradient(145deg,#1a3520,#254530)';
            b.style.borderColor='#4ade80';
            b.style.color='#4ade80';
          }
        });
        addTimer(setTimeout(()=>showCacciaResult(score,false),1500));
      }
    };
  }

  function showCacciaResult(s,won){
    area.innerHTML=`
      <div class="flex flex-col items-center justify-center h-full p-4 text-center">
        <div class="anim-fade">
          <div class="text-6xl mb-4">${won?'🏆':'💀'}</div>
          <h2 class="text-3xl font-black mb-2" style="color:${won?'#4ade80':'#ff6b6b'}">${won?'PERFETTO!':'GAME OVER'}</h2>
          <p class="text-lg mb-6" style="color:#8b7aa8">${won?`Tutte le 10 risposte corrette!`:`Punteggio: ${s}/10`}</p>
          <div class="flex gap-3 justify-center">
            <button onclick="startGame('caccia')" class="px-6 py-3 rounded-xl font-bold" style="background:linear-gradient(135deg,#6d28d9,#a855f7);color:white">🔄 Rigioca</button>
            <button onclick="backToMenu()" class="px-6 py-3 rounded-xl font-bold" style="background:rgba(255,255,255,0.1);color:#8b7aa8">Menu</button>
          </div>
        </div>
      </div>`;
  }

  showQuestion();
}

// ============ GAME 2: CURVA DELL'OBLIO ============
function initOblio(){
  const levelCounts=[3,4,4,5,6,7,8,10];
  let level=0,totalErrors=0;
  const maxErrors=5;
  const info=document.getElementById('game-header-info');
  const area=document.getElementById('game-area');

  function updateInfo(){
    info.innerHTML=`<span style="color:#7ec8e3">📖 Livello ${level+1}/8</span><span style="color:#ff6b6b">❌ ${totalErrors}/${maxErrors}</span>`;
  }

  function startLevel(){
    if(level>=8){showOblioResult(true);return}
    if(totalErrors>=maxErrors){showOblioResult(false);return}
    updateInfo();
    const count=levelCounts[level];
    const words=generateMemoryWords(count);
    const showTime=3000+count*800;

    // Show words phase
    area.innerHTML=`
      <div class="flex flex-col items-center justify-center h-full p-4 text-center" style="min-height:400px">
        <div class="w-full max-w-xl">
          <p class="text-sm space-mono mb-2" style="color:#5a8a9f">MEMORIZZA QUESTE ${count} PAROLE</p>
          <div class="w-full rounded-full h-1.5 mb-6" style="background:rgba(255,255,255,0.1)">
            <div id="memo-timer" class="h-full rounded-full timer-bar" style="width:100%;background:linear-gradient(90deg,#7ec8e3,#38bdf8)"></div>
          </div>
          <div class="flex flex-wrap justify-center gap-3 mb-4">
            ${words.map((w,i)=>`<span class="anim-pop px-4 py-2 rounded-lg text-lg font-bold" style="background:rgba(126,200,227,0.15);color:#7ec8e3;border:1px solid rgba(126,200,227,0.3);animation-delay:${i*0.1}s;opacity:0">${w}</span>`).join('')}
          </div>
        </div>
      </div>`;

    let elapsed=0;
    const interval=addTimer(setInterval(()=>{
      elapsed+=50;
      const bar=document.getElementById('memo-timer');
      if(bar)bar.style.width=`${Math.max(0,(1-elapsed/showTime)*100)}%`;
      if(elapsed>=showTime){clearInterval(interval);showInputPhase(words)}
    },50));
  }

  function showInputPhase(words){
    let answered=new Set();
    let errors=0;
    const shuffledWords=shuffle(words);

    area.innerHTML=`
      <div class="flex flex-col items-center justify-center h-full p-4 text-center" style="min-height:400px">
        <div class="w-full max-w-2xl">
          <p class="text-sm space-mono mb-4" style="color:#5a8a9f">CLICCA LE PAROLE CHE RICORDI (${words.length})</p>
          <div class="flex flex-wrap justify-center gap-2 mb-6" id="word-buttons">
            ${shuffledWords.map((w,i)=>`
              <button onclick="selectWord(this,'${w.replace(/'/g,"\\'")}',${answered.has(w)})" 
                class="card-hover anim-pop px-4 py-2 rounded-lg font-bold text-sm border transition-all"
                style="background:linear-gradient(145deg,#0d1a25,#0a2540);border-color:#1a4a6e;color:#7ec8e3;animation-delay:${i*0.08}s;opacity:0"
                data-word="${w}">
                ${w}
              </button>
            `).join('')}
          </div>
          <div class="flex flex-wrap justify-center gap-2 mb-4 min-h-[40px] p-3 rounded-xl" id="found-words" style="background:rgba(126,200,227,0.08);border:1px solid rgba(126,200,227,0.2)"></div>
          <p id="feedback-text" class="text-sm h-6 mb-2" style="color:#8b7aa8"></p>
          <p class="text-xs space-mono" style="color:#5a8a9f">Trovate: <span id="count-found">0</span>/${words.length} · Errori livello: <span id="count-err">0</span></p>
        </div>
      </div>`;

    window.selectWord=function(btn,word,alreadySelected){
      const fb=document.getElementById('feedback-text');
      if(answered.has(word)){
        answered.delete(word);
        btn.style.background='linear-gradient(145deg,#0d1a25,#0a2540)';
        btn.style.borderColor='#1a4a6e';
        btn.style.color='#7ec8e3';
        fb.textContent='❌ Deselezionato';fb.style.color='#8b7aa8';
      } else {
        answered.add(word);
        btn.style.background='linear-gradient(145deg,#1a3520,#254530)';
        btn.style.borderColor='#4ade80';
        btn.style.color='#4ade80';
        fb.textContent='✅ Selezionato';fb.style.color='#4ade80';
      }
      document.getElementById('count-found').textContent=answered.size;
      
      if(answered.size===words.length){
        addTimer(setTimeout(()=>{level++;startLevel()},800));
      }
    };
  }

  function showOblioResult(won){
    area.innerHTML=`
      <div class="flex flex-col items-center justify-center h-full p-4 text-center">
        <div class="anim-fade">
          <div class="text-6xl mb-4">${won?'🧠':'📖'}</div>
          <h2 class="text-3xl font-black mb-2" style="color:${won?'#4ade80':'#7ec8e3'}">${won?'MEMORIA PERFETTA!':'TROPPI ERRORI'}</h2>
          <p class="text-lg mb-6" style="color:#8b7aa8">${won?'Tutti gli 8 livelli completati!':`Arrivato al livello ${level+1} con ${totalErrors} errori`}</p>
          <div class="flex gap-3 justify-center">
            <button onclick="startGame('oblio')" class="px-6 py-3 rounded-xl font-bold" style="background:linear-gradient(135deg,#0369a1,#0ea5e9);color:white">🔄 Rigioca</button>
            <button onclick="backToMenu()" class="px-6 py-3 rounded-xl font-bold" style="background:rgba(255,255,255,0.1);color:#8b7aa8">Menu</button>
          </div>
        </div>
      </div>`;
  }

  startLevel();
}

// ============ GAME 3: CURIOSITY SPRINT ============
function initSprint(){
  const facts=generateSprintFacts();
  let lives=5,hits=0,factIndex=0,active=true;
  const TARGET=50;
  const info=document.getElementById('game-header-info');
  const area=document.getElementById('game-area');

  area.innerHTML=`
    <div class="relative w-full h-full overflow-hidden" id="sprint-field" style="background:linear-gradient(180deg,#0a0a0f,#1a1a0d)">
      <div class="absolute top-3 left-0 right-0 flex justify-center gap-6 z-10 text-sm space-mono" style="pointer-events:none">
        <span style="color:#4ade80">✅ <span id="sprint-hits">0</span>/50</span>
        <span style="color:#ff6b6b">❤️ <span id="sprint-lives">5</span></span>
      </div>
      <div class="absolute bottom-3 left-3 right-3 z-10" style="pointer-events:none">
        <div class="w-full rounded-full h-2" style="background:rgba(255,255,255,0.1)">
          <div id="sprint-progress" class="h-full rounded-full progress-bar" style="width:0%;background:linear-gradient(90deg,#4ade80,#f0d060)"></div>
        </div>
      </div>
    </div>`;

  function updateUI(){
    const h=document.getElementById('sprint-hits');
    const l=document.getElementById('sprint-lives');
    const p=document.getElementById('sprint-progress');
    if(h)h.textContent=hits;
    if(l)l.textContent=lives;
    if(p)p.style.width=`${(hits/TARGET)*100}%`;
    info.innerHTML=`<span style="color:#f0d060">⚡ Sprint</span>`;
  }

  function spawnFact(){
    if(!active)return;
    if(hits>=TARGET){endSprint(true);return}
    if(lives<=0){endSprint(false);return}

    const fact=facts[factIndex%facts.length];
    factIndex++;
    const field=document.getElementById('sprint-field');
    if(!field)return;

    const isTrue=fact.true;
    const el=document.createElement('div');
    el.className='falling-obj';
    const left=10+Math.random()*70;
    const speed=4+Math.random()*3;
    el.style.cssText=`left:${left}%;width:auto;max-width:240px;padding:10px 16px;border-radius:12px;font-size:13px;font-weight:700;text-align:center;line-height:1.3;z-index:5;animation-duration:${speed}s;`;
    
    if(isTrue){
      el.style.background='linear-gradient(145deg,#1a3520,#254530)';
      el.style.border='2px solid #4ade80';
      el.style.color='#4ade80';
      el.style.boxShadow='0 0 15px rgba(74,222,128,0.3)';
    } else {
      el.style.background='linear-gradient(145deg,#351a1a,#452525)';
      el.style.border='2px solid #ff6b6b';
      el.style.color='#ff6b6b';
      el.style.boxShadow='0 0 15px rgba(255,107,107,0.3)';
    }
    el.textContent=fact.text;

    let caught=false;
    el.addEventListener('click',()=>{
      if(caught)return;
      caught=true;
      el.classList.add('caught');
      if(isTrue){
        hits++;
        showFloating(el,'✅',true);
      } else {
        lives--;
        showFloating(el,'❌',false);
      }
      updateUI();
      setTimeout(()=>el.remove(),300);
      if(hits>=TARGET)endSprint(true);
      if(lives<=0)endSprint(false);
    });

    field.appendChild(el);

    // Remove if falls off + penalty for missing true facts
    addTimer(setTimeout(()=>{
      if(!caught&&el.parentNode){
        if(isTrue){lives--;updateUI();showMissed(el)}
        el.remove();
        if(lives<=0)endSprint(false);
      }
    },speed*1000));
  }

  function showFloating(ref,text,good){
    const f=document.createElement('div');
    f.textContent=text;
    f.style.cssText=`position:absolute;left:${ref.style.left};top:${ref.offsetTop}px;font-size:24px;pointer-events:none;z-index:20;transition:all 0.5s;opacity:1;`;
    document.getElementById('sprint-field').appendChild(f);
    requestAnimationFrame(()=>{f.style.top=`${parseInt(f.style.top)-40}px`;f.style.opacity='0'});
    setTimeout(()=>f.remove(),600);
  }

  function showMissed(ref){
    const f=document.createElement('div');
    f.textContent='MANCATO!';
    f.style.cssText=`position:absolute;left:${ref.style.left};bottom:60px;font-size:12px;color:#ff6b6b;pointer-events:none;z-index:20;transition:all 0.5s;opacity:1;font-weight:bold`;
    document.getElementById('sprint-field').appendChild(f);
    requestAnimationFrame(()=>{f.style.bottom='100px';f.style.opacity='0'});
    setTimeout(()=>f.remove(),600);
  }

  function endSprint(won){
    active=false;
    clearTimers();
    area.innerHTML=`
      <div class="flex flex-col items-center justify-center h-full p-4 text-center">
        <div class="anim-fade">
          <div class="text-6xl mb-4">${won?'⚡':'💔'}</div>
          <h2 class="text-3xl font-black mb-2" style="color:${won?'#f0d060':'#ff6b6b'}">${won?'SPRINT COMPLETATO!':'GAME OVER'}</h2>
          <p class="text-lg mb-6" style="color:#8b7aa8">${won?`50 fatti catturati con ${lives} vite rimaste!`:`Catturati ${hits}/50 fatti`}</p>
          <div class="flex gap-3 justify-center">
            <button onclick="startGame('sprint')" class="px-6 py-3 rounded-xl font-bold" style="background:linear-gradient(135deg,#a16207,#f0d060);color:#1a1a0d">🔄 Rigioca</button>
            <button onclick="backToMenu()" class="px-6 py-3 rounded-xl font-bold" style="background:rgba(255,255,255,0.1);color:#8b7aa8">Menu</button>
          </div>
        </div>
      </div>`;
  }

  updateUI();
  // Spawn facts at intervals
  const spawnInterval=addTimer(setInterval(()=>{
    if(active)spawnFact();
    else clearInterval(spawnInterval);
  },1800));
  spawnFact();
}

// Init icons
lucide.createIcons();
</script>
